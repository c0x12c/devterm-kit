# =============================================================================
# devterm — Starship config: Catppuccin Frappé (medium dark)
# https://github.com/catppuccin/starship
# =============================================================================

"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_frappe"

format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface2)\
$c\
$rust\
$golang\
$nodejs\
$python\
$java\
$kotlin\
[](fg:surface2)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = true

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style                    = "bold fg:blue bg:surface0"
format                   = "[ $path ]($style)"
truncation_length        = 4
truncate_to_repo         = true
truncation_symbol        = "…/"
read_only                = " 󰌾"
read_only_style          = "red bg:surface0"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
symbol    = " "
style     = "bold fg:mauve bg:surface1"
format    = "[ $symbol$branch(:$remote_branch) ]($style)"

[git_status]
style     = "bold fg:peach bg:surface1"
format    = "[$all_status$ahead_behind ]($style)"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "󰏗 "
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[cmd_duration]
min_time           = 3_000
style              = "fg:yellow"
format             = "[ 󱎫 $duration ]($style)"
show_milliseconds  = false

[time]
disabled    = false
style       = "fg:overlay1"
format      = "[ 󰥔 $time ]($style)"
time_format = "%H:%M"
use_12hr    = false

[os]
disabled = false
style    = "fg:text bg:surface0"

[os.symbols]
Macos   = "  "
Ubuntu  = "  "
Debian  = "  "
Arch    = "  "
Windows = "  "
Linux   = "  "

[nodejs]
symbol         = "  "
style          = "bold fg:green bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["package.json", ".node-version", ".nvmrc"]
detect_folders    = []
detect_extensions = []

[python]
symbol         = "  "
style          = "bold fg:yellow bg:surface2"
format         = "[ $symbol($version)(\\($virtualenv\\)) ]($style)"
detect_files   = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]
detect_extensions = []

[java]
symbol         = "  "
style          = "bold fg:red bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["pom.xml", "build.gradle", "build.gradle.kts"]
detect_extensions = []

[kotlin]
symbol         = "  "
style          = "bold fg:mauve bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["build.gradle.kts"]
detect_extensions = []

[golang]
symbol         = "  "
style          = "bold fg:sky bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files   = ["go.mod", "go.sum"]

[rust]
symbol         = "  "
style          = "bold fg:peach bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files   = ["Cargo.toml"]

[c]
symbol         = "  "
style          = "bold fg:sapphire bg:surface2"
format         = "[ $symbol($version(-$name)) ]($style)"
detect_files      = ["CMakeLists.txt", "Makefile"]
detect_extensions = []

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo  = "#eebebe"
pink      = "#f4b8e4"
mauve     = "#ca9ee6"
red       = "#e78284"
maroon    = "#ea999c"
peach     = "#ef9f76"
yellow    = "#e5c890"
green     = "#a6d189"
teal      = "#81c8be"
sky       = "#99d1db"
sapphire  = "#85c1dc"
blue      = "#8caaee"
lavender  = "#babbf1"
text      = "#c6d0f5"
subtext1  = "#b5bfe2"
subtext0  = "#a5adce"
overlay2  = "#949cbb"
overlay1  = "#838ba7"
overlay0  = "#737994"
surface2  = "#626880"
surface1  = "#51576d"
surface0  = "#414559"
base      = "#303446"
mantle    = "#292c3c"
crust     = "#232634"
