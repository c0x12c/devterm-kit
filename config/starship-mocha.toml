# =============================================================================
# devterm — Starship config: Catppuccin Mocha (dark)
# https://github.com/catppuccin/starship
# =============================================================================

"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

# ── Prompt format ──────────────────────────────────────────────────────────
format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface2)\
$rust\
$golang\
$nodejs\
$python\
$java\
$kotlin\
[](fg:surface2)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

# ── Global settings ────────────────────────────────────────────────────────
command_timeout = 1000
add_newline = true

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

# ── Directory ─────────────────────────────────────────────────────────────
[directory]
style                    = "bold fg:blue bg:surface0"
format                   = "[ $path ]($style)"
truncation_length        = 4
truncate_to_repo         = true
truncation_symbol        = "…/"
read_only                = " 󰌾"
read_only_style          = "red bg:surface0"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

# ── Git ───────────────────────────────────────────────────────────────────
[git_branch]
symbol    = " "
style     = "bold fg:mauve bg:surface1"
format    = "[ $symbol$branch(:$remote_branch) ]($style)"

[git_status]
style     = "bold fg:peach bg:surface1"
format    = "[$all_status$ahead_behind ]($style)"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "󰏗 "
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

# ── Command duration ───────────────────────────────────────────────────────
[cmd_duration]
min_time           = 3_000
style              = "fg:yellow"
format             = "[ 󱎫 $duration ]($style)"
show_milliseconds  = false

# ── Time ──────────────────────────────────────────────────────────────────
[time]
disabled        = false
style           = "fg:overlay1"
format          = "[ 󰥔 $time ]($style)"
time_format     = "%H:%M"
use_12hr        = false

# ── OS ────────────────────────────────────────────────────────────────────
[os]
disabled = false
style    = "fg:text bg:surface0"

[os.symbols]
Macos   = "  "
Ubuntu  = "  "
Debian  = "  "
Arch    = "  "
Windows = "  "
Linux   = "  "

# ── Languages (project-only) ───────────────────────────────────────────────
[nodejs]
symbol         = "  "
style          = "bold fg:green bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["package.json", ".node-version", ".nvmrc"]
detect_folders    = []
detect_extensions = []

[python]
symbol         = "  "
style          = "bold fg:yellow bg:surface2"
format         = "[ $symbol($version)(\\($virtualenv\\)) ]($style)"
detect_files      = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]
detect_extensions = []

[java]
symbol         = "  "
style          = "bold fg:red bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["pom.xml", "build.gradle", "build.gradle.kts"]
detect_extensions = []

[kotlin]
symbol         = "  "
style          = "bold fg:mauve bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files      = ["build.gradle.kts"]
detect_extensions = []

[golang]
symbol         = "  "
style          = "bold fg:sky bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files   = ["go.mod", "go.sum"]

[rust]
symbol         = "  "
style          = "bold fg:peach bg:surface2"
format         = "[ $symbol($version) ]($style)"
detect_files   = ["Cargo.toml"]

[c]
disabled = true

# ── Catppuccin Mocha palette ───────────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
