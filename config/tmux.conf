# =============================================================================
# ~/.tmux.conf — Generated by devterm (https://github.com/c0x12c/devterm-kit)
# Catppuccin Mocha theme · Sane defaults · No TPM dependency
# =============================================================================

# ── General ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Prefix ───────────────────────────────────────────────────────────────
# Change prefix from Ctrl+B to Ctrl+A (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ───────────────────────────────────────────────────────────────
# Split with | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# ── Vim-style pane navigation ────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+arrow
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── Reload ───────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Catppuccin Mocha Colors ──────────────────────────────────────────────
# Base colors
MOCHA_ROSEWATER="#f5e0dc"
MOCHA_FLAMINGO="#f2cdcd"
MOCHA_PINK="#f5c2e7"
MOCHA_MAUVE="#cba6f7"
MOCHA_RED="#f38ba8"
MOCHA_MAROON="#eba0ac"
MOCHA_PEACH="#fab387"
MOCHA_YELLOW="#f9e2af"
MOCHA_GREEN="#a6e3a1"
MOCHA_TEAL="#94e2d5"
MOCHA_SKY="#89dceb"
MOCHA_SAPPHIRE="#74c7ec"
MOCHA_BLUE="#89b4fa"
MOCHA_LAVENDER="#b4befe"
MOCHA_TEXT="#cdd6f4"
MOCHA_SUBTEXT1="#bac2de"
MOCHA_SUBTEXT0="#a6adc8"
MOCHA_OVERLAY2="#9399b2"
MOCHA_OVERLAY1="#7f849c"
MOCHA_OVERLAY0="#6c7086"
MOCHA_SURFACE2="#585b70"
MOCHA_SURFACE1="#45475a"
MOCHA_SURFACE0="#313244"
MOCHA_BASE="#1e1e2e"
MOCHA_MANTLE="#181825"
MOCHA_CRUST="#11111b"

# ── Status bar ───────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=$MOCHA_MANTLE,fg=$MOCHA_TEXT"
set -g status-left "#[fg=$MOCHA_BASE,bg=$MOCHA_MAUVE,bold] #S #[fg=$MOCHA_MAUVE,bg=$MOCHA_MANTLE] "
set -g status-right "#[fg=$MOCHA_SUBTEXT0] %H:%M #[fg=$MOCHA_BLUE,bg=$MOCHA_MANTLE] #h "
set -g status-left-length 30
set -g status-right-length 40

# Window tabs
setw -g window-status-format "#[fg=$MOCHA_OVERLAY0,bg=$MOCHA_MANTLE] #I:#W "
setw -g window-status-current-format "#[fg=$MOCHA_BASE,bg=$MOCHA_BLUE,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=$MOCHA_SURFACE1"
set -g pane-active-border-style "fg=$MOCHA_MAUVE"

# Message style
set -g message-style "fg=$MOCHA_TEXT,bg=$MOCHA_SURFACE0"
